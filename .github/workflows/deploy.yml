name: Deploy goals

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # ----- Backend -----
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Stage Lambda zip
        run: |
          set -euo pipefail
          # No third-party runtime deps — @aws-sdk/* ships with the
          # nodejs20.x runtime — so we just zip the source as-is.
          mkdir -p build/lambda
          cp -r backend/. build/lambda/
          rm -rf build/lambda/node_modules
          cd build/lambda
          zip -qr ../function.zip .

      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME }}" \
            --zip-file fileb://build/function.zip \
            --no-cli-pager > /dev/null
          aws lambda wait function-updated \
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME }}"

      # ----- Frontend -----
      - name: Install frontend deps
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.API_URL }}
          VITE_COGNITO_REGION: ${{ vars.COGNITO_REGION }}
          VITE_COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_APP_CLIENT_ID: ${{ vars.COGNITO_APP_CLIENT_ID }}
        run: npm run build

      - name: Sync frontend dist to S3
        run: |
          # Hashed assets (Vite emits /assets/*-<hash>.{js,css}) can be cached
          # aggressively — the hash changes when content changes.
          aws s3 sync frontend/dist/ "s3://${{ vars.S3_BUCKET }}/" \
            --delete \
            --exclude "index.html" \
            --exclude "icon.svg" \
            --exclude "manifest.webmanifest" \
            --exclude "*.DS_Store" \
            --cache-control "public, max-age=31536000, immutable"

          # index.html is the entry point referencing the latest hashed bundles.
          aws s3 cp frontend/dist/index.html "s3://${{ vars.S3_BUCKET }}/index.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "public, max-age=60, must-revalidate"

          # icon + manifest are at fixed filenames (no fingerprint), so we
          # serve them with a short TTL.
          if [ -f frontend/dist/icon.svg ]; then
            aws s3 cp frontend/dist/icon.svg "s3://${{ vars.S3_BUCKET }}/icon.svg" \
              --content-type "image/svg+xml" \
              --cache-control "public, max-age=300, must-revalidate"
          fi
          if [ -f frontend/dist/manifest.webmanifest ]; then
            aws s3 cp frontend/dist/manifest.webmanifest "s3://${{ vars.S3_BUCKET }}/manifest.webmanifest" \
              --content-type "application/manifest+json" \
              --cache-control "public, max-age=300, must-revalidate"
          fi

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/index.html" "/" "/icon.svg" "/manifest.webmanifest" \
            --no-cli-pager > /dev/null
